<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kopius Fortune Wheel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2d0a1e, #3b0f2a, #1a0610);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,.3);
      letter-spacing: 2px;
    }

    .wheel-container {
      position: relative;
      width: 340px;
      height: 340px;
      margin-bottom: 30px;
    }

    #wheelCanvas {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(0,0,0,.5), 0 0 60px rgba(203,33,109,.3);
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 36px solid #CB216D;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
      z-index: 10;
    }

    #spinBtn {
      padding: 14px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #99007F, #CB216D);
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 15px rgba(153,0,127,.4);
    }

    #spinBtn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(153,0,127,.6);
    }

    #spinBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
      background: #666;
      box-shadow: none;
    }

    .result-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .result-overlay.active { display: flex; }

    .result-box {
      background: linear-gradient(135deg, #3b0f2a, #2d0a1e);
      border: 2px solid #CB216D;
      border-radius: 20px;
      padding: 40px 50px;
      text-align: center;
      animation: popIn .35s ease;
    }

    .result-box h2 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #D7296A;
    }

    .result-box p {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .result-box button {
      padding: 10px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: #CB216D;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    @keyframes popIn {
      from { transform: scale(.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .history {
      position: fixed;
      right: 20px;
      top: 20px;
      background: rgba(0,0,0,.4);
      border-radius: 12px;
      padding: 15px;
      max-height: 60vh;
      overflow-y: auto;
      min-width: 180px;
    }

    .history h3 {
      font-size: .9rem;
      margin-bottom: 8px;
      opacity: .7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-item {
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      font-size: .85rem;
      background: rgba(255,255,255,.08);
    }

    .history-item.exhausted {
      opacity: .4;
      text-decoration: line-through;
    }

    .all-done-msg {
      font-size: 1.3rem;
      color: #D7296A;
      margin-top: 15px;
      display: none;
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .wheel-container { width: 280px; height: 280px; }
      #wheelCanvas { width: 280px; height: 280px; }
      .history { position: static; margin-top: 20px; max-height: 30vh; }
      .result-box { padding: 25px 30px; }
      .result-box p { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <h1>KOPIUS FORTUNE WHEEL</h1>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="680" height="680"></canvas>
  </div>

  <button id="spinBtn">GIRAR</button>
  <p class="all-done-msg" id="allDoneMsg">¡Todos los premios han sido entregados!</p>

  <div class="history" id="history">
    <h3>Historial</h3>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-box">
      <h2>¡Felicidades!</h2>
      <p id="resultText"></p>
      <button id="closeResult">CERRAR</button>
    </div>
  </div>

  <script>
    /* ── Prize definitions with stock caps ── */
    const prizes = [
      { name: "Set de Mate",       stock: 14, remaining: 14 },
      { name: "Botella",           stock: 14, remaining: 14 },
      { name: "Soporte / Pad",    stock: 14, remaining: 14 },
      { name: "Cuaderno",          stock:  6, remaining:  6 },
      { name: "Try again",         stock: Infinity, remaining: Infinity, isTryAgain: true },
      { name: "Mochila",           stock:  7, remaining:  7 },
    ];

    /* ── Wheel image & angle constants (match original design) ── */
    const INITIAL_ANGLE = -Math.PI / 8;          // -22.5 deg offset so slices align with image
    const GAP_CENTERS_DEG = [7.5, 69.5, 124.5, 187.0, 247.0, 304.5];
    const GAP_CENTERS_RAD = GAP_CENTERS_DEG.map(d => d * Math.PI / 180);

    const NUM = prizes.length;
    const ARC = (2 * Math.PI) / NUM;

    /* ── Canvas setup ── */
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = cx - 4;

    let currentAngle = INITIAL_ANGLE;
    let spinning = false;
    let wheelImg = null;
    let imgLoaded = false;

    /* ── Load wheel background image ── */
    const img = new Image();
    img.onload = function() {
      wheelImg = img;
      imgLoaded = true;
      drawWheel();
    };
    img.onerror = function() {
      console.warn("Could not load Logo Kopius.png — using fallback colors");
      drawWheel();
    };
    img.src = "Logo Kopius.png";

    /* ── Draw wheel ── */
    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(currentAngle);

      if (imgLoaded && wheelImg) {
        // Draw the image centered, scaled to fill the wheel
        const size = radius * 2;
        ctx.drawImage(wheelImg, -radius, -radius, size, size);
      } else {
        // Fallback: colored segments
        const colors = ["#99007F","#CB216D","#D72969","#F73F5D","#BE1972","#D52869"];
        for (let i = 0; i < NUM; i++) {
          const startA = i * ARC;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, startA, startA + ARC);
          ctx.closePath();
          ctx.fillStyle = prizes[i].remaining > 0 ? colors[i] : "#444";
          ctx.fill();
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      // Overlay text labels at the pre-calculated gap angles
      for (let i = 0; i < NUM; i++) {
        const angle = GAP_CENTERS_RAD[i];
        const available = prizes[i].remaining > 0;

        ctx.save();
        ctx.rotate(angle);
        ctx.textAlign = "right";
        ctx.fillStyle = available ? "#fff" : "rgba(255,255,255,.35)";
        ctx.font = `bold ${available ? 26 : 22}px 'Segoe UI', sans-serif`;
        ctx.shadowColor = "rgba(0,0,0,.7)";
        ctx.shadowBlur = 4;
        ctx.fillText(prizes[i].name, radius - 18, 8);
        ctx.restore();
      }

      ctx.restore(); // undo translate+rotate
    }

    /* ── Determine which segment the pointer is on ── */
    function getWinningIndex() {
      // Pointer is at top (angle -π/2 in canvas coords).
      // We need to figure out which gap the pointer falls into.
      // Normalize the effective angle at the pointer position.
      const raw = (-Math.PI / 2 - currentAngle) % (2 * Math.PI);
      const pointerAngle = ((raw % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

      // Find which gap center is closest to the pointer angle
      let bestIdx = 0;
      let bestDist = Infinity;
      for (let i = 0; i < NUM; i++) {
        let diff = Math.abs(pointerAngle - GAP_CENTERS_RAD[i]);
        if (diff > Math.PI) diff = 2 * Math.PI - diff;
        if (diff < bestDist) {
          bestDist = diff;
          bestIdx = i;
        }
      }
      return bestIdx;
    }

    /* ── Stock helpers ── */
    function anyAvailable() {
      return prizes.some(p => p.remaining > 0 && !p.isTryAgain);
    }

    function allExhausted() {
      return prizes.every(p => p.remaining <= 0 || p.isTryAgain);
    }

    /* ── History ── */
    function addHistory(name, exhausted) {
      const div = document.createElement("div");
      div.className = "history-item" + (exhausted ? " exhausted" : "");
      div.textContent = name;
      const container = document.getElementById("history");
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    /* ── Spin logic ── */
    function spin() {
      if (spinning || !anyAvailable()) return;
      spinning = true;
      document.getElementById("spinBtn").disabled = true;

      const totalRotation = (Math.random() * 4 + 5) * 2 * Math.PI; // 5–9 full rotations
      const startAngle = currentAngle;
      const targetAngle = startAngle + totalRotation;
      const duration = 4000 + Math.random() * 1000; // 4–5 seconds
      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Cubic ease-out
        const eased = 1 - Math.pow(1 - progress, 3);
        currentAngle = startAngle + totalRotation * eased;

        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          currentAngle = currentAngle % (2 * Math.PI);
          handleResult();
        }
      }

      requestAnimationFrame(animate);
    }

    /* ── Handle result after spin ── */
    function handleResult() {
      const idx = getWinningIndex();
      const prize = prizes[idx];

      // "Try again" slot — no prize, just let them spin again
      if (prize.isTryAgain) {
        addHistory("Try again", false);
        spinning = false;
        document.getElementById("resultText").textContent = "¡Intentá de nuevo!";
        document.getElementById("resultOverlay").querySelector("h2").textContent = "Oops...";
        document.getElementById("resultOverlay").classList.add("active");
        return;
      }

      if (prize.remaining <= 0) {
        // Prize exhausted — auto re-spin
        addHistory(prize.name + " (agotado)", true);
        spinning = false;
        setTimeout(() => {
          if (anyAvailable()) {
            spin();
          } else {
            showAllDone();
          }
        }, 600);
        return;
      }

      // Award prize
      prize.remaining--;
      addHistory(prize.name, false);
      drawWheel(); // Redraw to grey out if now exhausted

      // Show result
      document.getElementById("resultOverlay").querySelector("h2").textContent = "¡Felicidades!";
      document.getElementById("resultText").textContent = prize.name;
      document.getElementById("resultOverlay").classList.add("active");

      spinning = false;

      if (allExhausted()) {
        showAllDone();
      }
    }

    function showAllDone() {
      document.getElementById("spinBtn").disabled = true;
      document.getElementById("allDoneMsg").style.display = "block";
    }

    /* ── Close result overlay ── */
    document.getElementById("closeResult").addEventListener("click", () => {
      document.getElementById("resultOverlay").classList.remove("active");
      if (!allExhausted()) {
        document.getElementById("spinBtn").disabled = false;
      }
    });

    /* ── Spin button ── */
    document.getElementById("spinBtn").addEventListener("click", spin);

    /* ── Initial draw ── */
    drawWheel();
  </script>
</body>
</html>
