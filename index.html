<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel — Kopius</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #08000a;
    --surface: #120010;
    --surface2:#1c0018;
    --border:  #420032;
    --hot:     #f03f6e;
    --deep:    #9c0080;
    --mid:     #c8206d;
    --text:    #ffd6ee;
    --muted:   #a06888;
    --accent:  #ff6090;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem 4rem; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.5rem); font-weight:900; letter-spacing:0.04em; background:linear-gradient(90deg,var(--hot),var(--deep)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; margin-bottom:0.25rem; }
  .subtitle { font-size:0.85rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; text-align:center; margin-bottom:2.5rem; }
  .main-layout { display:flex; gap:2.5rem; align-items:flex-start; justify-content:center; flex-wrap:wrap; width:100%; max-width:1100px; }
  .wheel-section { display:flex; flex-direction:column; align-items:center; gap:1.5rem; flex:0 0 auto; }
  .wheel-wrapper { position:relative; width:380px; height:380px; }
  .wheel-pointer { position:absolute; top:-22px; left:50%; transform:translateX(-50%); z-index:10; width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:36px solid var(--hot); filter:drop-shadow(0 2px 12px rgba(240,63,110,0.8)); }
  #wheelCanvas { width:380px; height:380px; border-radius:50%; box-shadow:0 0 0 5px var(--deep), 0 0 40px rgba(200,32,109,0.4), 0 20px 60px rgba(0,0,0,0.9); }
  .spin-btn { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; letter-spacing:0.1em; padding:0.85rem 3rem; background:linear-gradient(135deg,var(--hot),var(--deep)); color:#fff; border:none; border-radius:3px; cursor:pointer; text-transform:uppercase; transition:transform 0.1s, box-shadow 0.2s; box-shadow:0 4px 20px rgba(200,32,109,0.5); }
  .spin-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(240,63,110,0.6); }
  .spin-btn:active { transform:translateY(0); }
  .spin-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .result-box { min-height:60px; text-align:center; padding:0.75rem 1.5rem; background:var(--surface2); border:1px solid var(--border); border-radius:4px; width:100%; max-width:380px; transition:all 0.3s; }
  .result-label { font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .result-value { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--accent); font-weight:700; }
  .sidebar { flex:1; min-width:280px; max-width:380px; display:flex; flex-direction:column; gap:1.25rem; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:1.25rem; }
  .panel-title { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--hot); margin-bottom:1rem; letter-spacing:0.05em; display:flex; align-items:center; gap:8px; }
  .panel-title::before { content:''; display:block; width:3px; height:16px; background:linear-gradient(to bottom,var(--hot),var(--deep)); border-radius:2px; }
  .entries-list { display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; padding-right:4px; margin-bottom:0.75rem; }
  .entries-list::-webkit-scrollbar { width:4px; }
  .entries-list::-webkit-scrollbar-track { background:var(--surface2); }
  .entries-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .entry-row { display:flex; align-items:center; gap:6px; animation:slideIn 0.2s ease; }
  .entry-row.exhausted .entry-input { opacity:0.35; text-decoration:line-through; }
  .entry-row.exhausted .entry-num { opacity:0.35; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .entry-num { font-size:0.7rem; color:var(--muted); min-width:18px; text-align:center; font-weight:500; }
  .entry-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:0.45rem 0.65rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; transition:border-color 0.2s; outline:none; }
  .entry-input:focus { border-color:var(--hot); }
  .del-btn { background:none; border:1px solid var(--border); color:var(--muted); width:26px; height:26px; border-radius:4px; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s,color 0.15s; }
  .del-btn:hover { background:rgba(240,63,110,0.15); color:var(--accent); border-color:var(--hot); }
  .add-btn { width:100%; padding:0.55rem; background:transparent; border:1px dashed var(--border); border-radius:4px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer; transition:all 0.2s; }
  .add-btn:hover { border-color:var(--hot); color:var(--hot); background:rgba(240,63,110,0.06); }
  .history-list { display:flex; flex-direction:column; gap:5px; max-height:140px; overflow-y:auto; }
  .history-item { font-size:0.8rem; color:var(--muted); padding:4px 8px; background:var(--surface2); border-radius:3px; display:flex; justify-content:space-between; }
  .history-item span { color:var(--accent); }
  .empty-history { font-size:0.8rem; color:var(--muted); text-align:center; padding:0.75rem 0; }
</style>
</head>
<body>
<h1>Spin the Wheel</h1>
<p class="subtitle">Fortune favours the bold</p>
<div class="main-layout">
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="380" height="380"></canvas>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin</button>
    <div class="result-box" id="resultBox">
      <div class="result-label">Result</div>
      <div class="result-value" id="resultValue">—</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Wheel Entries <span style="font-size:0.75rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;">(max 6)</span></div>
      <div class="entries-list" id="entriesList"></div>
      <button class="add-btn" id="addBtn" onclick="addEntry()">+ Add entry</button>
    </div>
    <div class="panel">
      <div class="panel-title">Spin History</div>
      <div id="historyList" class="history-list">
        <div class="empty-history">No spins yet</div>
      </div>
    </div>
  </div>
</div>

// Pixel-analysed gap centers (1° resolution scan at r=103px):
// Gaps at: 7.5°, 69.5°, 124.5°, 187°, 247°, 304.5° (canvas coords: 0=right, CW)
// initial_angle = -22.5° = -PI/8 so slice midpoints land exactly on gaps
const INITIAL_ANGLE = -Math.PI / 8; // -22.5 degrees
const MAX_ENTRIES = 6;

// Gap centers in RADIANS (canvas coordinate system)
const GAP_CENTERS_DEG = [7.5, 69.5, 124.5, 187.0, 247.0, 304.5];
const GAP_CENTERS_RAD = GAP_CENTERS_DEG.map(d => d * Math.PI / 180);

let entries = [
  { name: 'Sets de mate',  stock: 14, remaining: 14 },
  { name: 'Botellas',      stock: 14, remaining: 14 },
  { name: 'Soportes',      stock: 14, remaining: 14 },
  { name: 'Cuadernos',     stock:  6, remaining:  6 },
  { name: 'Mousepads',     stock: 14, remaining: 14 },
  { name: 'Mochilas',      stock:  7, remaining:  7 },
];
let currentAngle = INITIAL_ANGLE;
let spinning = false;
let spinCount = 0;
let logoImage = null;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');

const img = new Image();
img.onload = () => { logoImage = img; drawWheel(); };
img.src = LOGO_SRC;

function escapeHTML(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function allExhausted() {
  return entries.every(e => e.remaining <= 0);
}

function anyAvailable() {
  return entries.some(e => e.remaining > 0);
}

function renderEntries() {
  const list = document.getElementById('entriesList');
  list.innerHTML = '';
  entries.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'entry-row' + (entry.remaining <= 0 ? ' exhausted' : '');

    const num = document.createElement('span');
    num.className = 'entry-num';
    num.textContent = i + 1;

    const input = document.createElement('input');
    input.className = 'entry-input';
    input.type = 'text';
    input.value = entry.name;
    input.placeholder = 'Entry ' + (i + 1);
    input.addEventListener('input', function() { updateLabel(i, this.value); });
    if (entry.remaining <= 0) input.disabled = true;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.title = 'Remove';
    del.textContent = '\u2715';
    del.addEventListener('click', function() { deleteEntry(i); });

    row.appendChild(num);
    row.appendChild(input);
    row.appendChild(del);
    list.appendChild(row);
  });
  document.getElementById('addBtn').style.display = entries.length >= MAX_ENTRIES ? 'none' : 'block';
  updateSpinButton();
  drawWheel();
}

function updateLabel(i, v) { entries[i].name = v; drawWheel(); }

function addEntry() {
  if (entries.length >= MAX_ENTRIES) return;
  entries.push({ name: 'Entry ' + (entries.length + 1), stock: 1, remaining: 1 });
  renderEntries();
}

function deleteEntry(i) {
  if (entries.length <= 2) return alert('Need at least 2 entries!');
  entries.splice(i, 1);
  renderEntries();
}

function updateSpinButton() {
  const btn = document.getElementById('spinBtn');
  if (allExhausted()) {
    btn.disabled = true;
    document.getElementById('resultValue').textContent = 'All prizes claimed!';
    document.getElementById('resultBox').style.borderColor = 'var(--hot)';
  }
}

function drawWheel() {
  const size = canvas.width;
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  const n = entries.length;

  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.translate(cx, cy);

  // Draw image — rotate by currentAngle
  ctx.save();
  ctx.rotate(currentAngle);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, 2 * Math.PI);
  ctx.clip();
  if (logoImage) {
    ctx.drawImage(logoImage, -r, -r, r * 2, r * 2);
  } else {
    ctx.fillStyle = '#08000a';
    ctx.fill();
  }
  ctx.restore();

  // Draw text — positioned at FIXED gap angles + currentAngle rotation
  const n6 = Math.min(n, 6);
  for (let i = 0; i < n6; i++) {
    const gapAngle = GAP_CENTERS_RAD[i] + currentAngle;
    const isExhausted = entries[i].remaining <= 0;

    ctx.save();
    ctx.rotate(gapAngle);
    ctx.textAlign = 'right';

    const fontSize = 13;
    ctx.font = '700 ' + fontSize + 'px "DM Sans", sans-serif';

    const label = entries[i].name || '';
    const maxLen = 13;
    const txt = label.length > maxLen ? label.slice(0, maxLen) + '\u2026' : label;

    ctx.globalAlpha = isExhausted ? 0.25 : 1;

    // Heavy black stroke for legibility
    ctx.strokeStyle = 'rgba(0,0,0,0.98)';
    ctx.lineWidth = 5;
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(0,0,0,1)';
    ctx.shadowBlur = 10;
    ctx.strokeText(txt, r - 14, 5);

    // White fill (or grey if exhausted)
    ctx.fillStyle = isExhausted ? '#888888' : '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 2;
    ctx.fillText(txt, r - 14, 5);

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  ctx.restore();
}

function spinWheel() {
  if (spinning || entries.length < 2 || allExhausted()) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultValue').textContent = '\u2026';
  document.getElementById('resultBox').style.borderColor = 'var(--border)';

  const spinDeg = 1440 + Math.random() * 1440;
  const spinRad = spinDeg * Math.PI / 180;
  const duration = 3500 + Math.random() * 1500;
  const start = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    currentAngle = startAngle + spinRad * easeOut(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(step); } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      handleResult();
    }
  }
  requestAnimationFrame(step);
}

function getWinnerIndex() {
  const n = Math.min(entries.length, 6);
  const pointerAngle = -Math.PI / 2;
  let bestIdx = 0, bestDist = Infinity;
  for (let i = 0; i < n; i++) {
    const gapAngle = GAP_CENTERS_RAD[i] + currentAngle;
    let dist = Math.abs(((gapAngle - pointerAngle + Math.PI) % (2 * Math.PI)) - Math.PI);
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  return bestIdx;
}

function handleResult() {
  const idx = getWinnerIndex();
  const entry = entries[idx];

  if (entry.remaining > 0) {
    // Valid win — decrement stock, show result
    entry.remaining--;
    spinCount++;

    document.getElementById('resultValue').textContent = entry.name;
    document.getElementById('resultBox').style.borderColor = 'var(--hot)';

    addHistory(entry.name);
    renderEntries(); // re-render to update greyed-out state
  } else {
    // Prize exhausted — auto re-spin
    if (anyAvailable()) {
      document.getElementById('resultValue').textContent = 'Out of stock \u2014 re-spinning\u2026';
      document.getElementById('resultBox').style.borderColor = 'var(--border)';
      setTimeout(spinWheel, 800);
    } else {
      document.getElementById('resultValue').textContent = 'All prizes claimed!';
      document.getElementById('resultBox').style.borderColor = 'var(--hot)';
      document.getElementById('spinBtn').disabled = true;
      renderEntries();
    }
  }
}

function addHistory(winnerName) {
  const hist = document.getElementById('historyList');
  const empty = hist.querySelector('.empty-history');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'history-item';
  item.style.borderLeft = '3px solid var(--hot)';

  const numSpan = document.createElement('span');
  numSpan.textContent = '#' + spinCount;

  const nameSpan = document.createElement('span');
  nameSpan.textContent = winnerName;

  item.appendChild(numSpan);
  item.appendChild(nameSpan);
  hist.insertBefore(item, hist.firstChild);
  if (hist.children.length > 8) hist.lastChild.remove();
}

renderEntries();
</script>
